name: Daily Scrape

on:
  schedule:
    # 7:00 AM ET (11:00 UTC) and 5:30 PM ET (21:30 UTC)
    - cron: '0 11 * * *'
    - cron: '30 21 * * *'
  workflow_dispatch:  # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Random start delay (0-15 minutes) so scraping doesn't start at the
      # exact same time every day. Makes traffic pattern less bot-like.
      - name: Random start delay
        run: |
          DELAY=$((RANDOM % 900))
          echo "Sleeping ${DELAY} seconds ($(( DELAY / 60 )) minutes) before starting..."
          sleep $DELAY

      # --- Each nursery runs as its own step with continue-on-error ---
      - name: Scrape nature-hills
        continue-on-error: true
        id: nature_hills
        run: python -m scrapers.runner --retailer nature-hills --skip-promos

      - name: Scrape planting-tree
        continue-on-error: true
        id: planting_tree
        run: python -m scrapers.runner --retailer planting-tree --skip-promos

      - name: Scrape spring-hill
        continue-on-error: true
        id: spring_hill
        run: python -m scrapers.runner --retailer spring-hill --skip-promos

      - name: Scrape fast-growing-trees
        continue-on-error: true
        id: fast_growing_trees
        run: python -m scrapers.runner --retailer fast-growing-trees --skip-promos

      - name: Scrape proven-winners-direct
        continue-on-error: true
        id: proven_winners
        run: python -m scrapers.runner --retailer proven-winners-direct --skip-promos

      - name: Scrape great-garden-plants
        continue-on-error: true
        id: great_garden_plants
        run: python -m scrapers.runner --retailer great-garden-plants --skip-promos

      - name: Scrape stark-bros
        continue-on-error: true
        id: stark_bros
        run: python -m scrapers.runner --retailer stark-bros --skip-promos

      # --- Collect results, build, and commit regardless of individual failures ---
      - name: Report nursery health
        if: always()
        run: |
          echo "=== Nursery Scrape Health Report ==="
          echo "nature-hills:          ${{ steps.nature_hills.outcome }}"
          echo "planting-tree:         ${{ steps.planting_tree.outcome }}"
          echo "spring-hill:           ${{ steps.spring_hill.outcome }}"
          echo "fast-growing-trees:    ${{ steps.fast_growing_trees.outcome }}"
          echo "proven-winners-direct: ${{ steps.proven_winners.outcome }}"
          echo "great-garden-plants:   ${{ steps.great_garden_plants.outcome }}"
          echo "stark-bros:            ${{ steps.stark_bros.outcome }}"

          # Flag degraded nurseries (failures) but don't block deployment
          FAILED=0
          for step_outcome in "${{ steps.nature_hills.outcome }}" "${{ steps.planting_tree.outcome }}" "${{ steps.spring_hill.outcome }}" "${{ steps.fast_growing_trees.outcome }}" "${{ steps.proven_winners.outcome }}" "${{ steps.great_garden_plants.outcome }}" "${{ steps.stark_bros.outcome }}"; do
            if [ "$step_outcome" = "failure" ]; then
              FAILED=$((FAILED + 1))
            fi
          done

          if [ $FAILED -gt 0 ]; then
            echo "WARNING: $FAILED nursery scraper(s) failed -- flagged as degraded"
          else
            echo "All nurseries scraped successfully"
          fi

      - name: Run tests
        id: tests
        continue-on-error: true
        run: pytest

      - name: Flag test failures
        if: steps.tests.outcome == 'failure'
        run: echo "::warning::Tests failed — review pytest output above. Price data commit will proceed."

      - name: Strip unresolved variants
        if: always()
        run: |
          python -c "
          import glob, json
          stripped = 0
          for f in glob.glob('data/prices/*.jsonl'):
              lines = []
              mod = False
              with open(f, encoding='utf-8') as fh:
                  for line in fh:
                      if not line.strip(): continue
                      e = json.loads(line)
                      sizes = e.get('sizes', {})
                      clean = {k:v for k,v in sizes.items() if not k.startswith('variant-')}
                      if len(clean) < len(sizes):
                          stripped += len(sizes) - len(clean)
                          e['sizes'] = clean
                          mod = True
                      lines.append(json.dumps(e, ensure_ascii=False))
              if mod:
                  with open(f, 'w', encoding='utf-8') as fh:
                      fh.write('\n'.join(lines) + '\n')
          print(f'Stripped {stripped} bad tiers')
          "

      - name: Remove broken retailer links
        if: always()
        run: |
          python -c "
          import glob, json, requests, time

          session = requests.Session()
          session.headers.update({'User-Agent': 'Mozilla/5.0 (compatible; PlantPriceTracker/1.0)'})

          # Collect unique URLs to check (one per retailer per plant)
          url_map = {}  # (plant_file, retailer_id) -> url
          for f in glob.glob('data/prices/*.jsonl'):
              with open(f, encoding='utf-8') as fh:
                  for line in fh:
                      if not line.strip(): continue
                      e = json.loads(line)
                      rid = e.get('retailer_id', '')
                      url = e.get('url', '')
                      if url and rid:
                          url_map[(f, rid)] = url.split('?')[0]

          # Dedupe URLs to minimize requests
          unique_urls = set(url_map.values())
          print(f'Checking {len(unique_urls)} unique retailer URLs...')

          broken = set()
          for url in unique_urls:
              try:
                  resp = session.head(url, timeout=10, allow_redirects=False)
                  if resp.status_code == 404:
                      broken.add(url)
                      print(f'  BROKEN: {url}')
                  time.sleep(0.5)
              except:
                  pass  # Network error = skip, don't remove

          if not broken:
              print('All retailer URLs OK')
          else:
              print(f'{len(broken)} broken URLs -- removing stale entries')
              removed = 0
              for f in glob.glob('data/prices/*.jsonl'):
                  lines = []
                  mod = False
                  with open(f, encoding='utf-8') as fh:
                      for line in fh:
                          if not line.strip(): continue
                          e = json.loads(line)
                          url = e.get('url', '').split('?')[0]
                          if url in broken:
                              removed += 1
                              mod = True
                              continue
                          lines.append(json.dumps(e, ensure_ascii=False))
                  if mod:
                      with open(f, 'w', encoding='utf-8') as fh:
                          fh.write('\n'.join(lines) + '\n')
              print(f'Removed {removed} entries with broken URLs')
          "

      - name: Verify prices (10 random spot checks)
        if: always()
        run: |
          python -m scrapers.verify --count 10 || echo "WARNING: Price mismatches detected -- review verify output above"

      - name: Build site
        if: always()
        run: python -X utf8 build.py

      - name: Verify internal links
        if: always()
        run: |
          python -c "
          import os, re
          broken = 0
          for root, dirs, files in os.walk('site'):
              for f in files:
                  if not f.endswith('.html'): continue
                  path = os.path.join(root, f)
                  with open(path, encoding='utf-8') as fh:
                      content = fh.read()
                  for link in re.findall(r'href=\"(/[^\"#]+)\"', content):
                      if link.startswith('/assets/'): continue
                      link_path = os.path.join('site', link.lstrip('/'))
                      if not os.path.exists(link_path):
                          print(f'BROKEN: {path} -> {link}')
                          broken += 1
          if broken > 0:
              print(f'{broken} broken internal links!')
              exit(1)
          print('All internal links OK')
          "

      - name: Scrape promo codes
        if: always()
        run: |
          python -c "
          import sys, json
          from pathlib import Path
          sys.path.insert(0, '.')
          from scrapers.runner import scrape_promos, load_json
          retailers = load_json(Path('data/retailers.json'))
          scrape_promos(retailers)
          " || echo "WARNING: Promo scraping failed -- skipping"

      - name: Commit updated price data
        if: always()
        run: |
          git config user.name "PlantPriceTracker Bot"
          git config user.email "bot@plantpricetracker.com"
          git add data/prices/ data/last_manifest.json data/promos.json site/
          git diff --staged --quiet || git commit -m "Daily price update $(date +%Y-%m-%d_%H:%M)"
          git push
